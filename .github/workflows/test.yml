name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        # Install [viz] alongside [dev] so optional-dep-dependent tests
        # (scipy clustering, matplotlib radar rendering) actually run in CI
        # rather than skip. Tests use pytest.skipif as a safety net for
        # contributor envs that install [dev] alone.
        run: pip install -e ".[dev,viz]"
      - name: Run tests
        run: pytest tests/ -q
